<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>譁ｰ縺励＞縺翫＞縺薙＠?譁ｰ縺溘↑莠悟鴻?</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            font-family: 'Helvetica Neue', Arial, "Hiragino Sans", "Meiryo", sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 90vw;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .timer-common {
            font-weight: 200;
            line-height: 1.1;
            margin: 0;
            padding: 0;
            transition: opacity 0.5s ease; 
        }

        #bg-text {
            position: absolute;
            width: 100%;
            font-size: 8vw;
            color: #ff0000;
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
            word-break: break-all;
            white-space: normal;
        }

        #timer {
            position: relative;
            font-size: 25vw;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            z-index: 2;
        }

        #end-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            background-image: url('1.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        /* JSでこのクラスを付与して画像を表示させる */
        #end-image.show {
            opacity: 1;
            pointer-events: auto; /* クリックなどを有効化 */
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="bg-text" class="timer-common">
            IuOBneOCjCLjga805pyIMeaXpTE6MDDjgavjgZPjgZPjgbjmnaXjgb7jgZnjgII=
        </div>
        
        <div id="timer" class="timer-common">--<br>--<br>--</div>
    </div>

    <div id="end-image"></div>

    <script>
        // const targetDate = new Date(Date.now() + 10000).getTime(); 
        const targetDate = new Date('2026-04-01T01:00:00').getTime();

        const timerDisplay = document.getElementById('timer');
        const bgTextDisplay = document.getElementById('bg-text');
        const endImageDisplay = document.getElementById('end-image');

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(interval); // ループを止める

                timerDisplay.style.opacity = '0';
                bgTextDisplay.style.opacity = '0';


                endImageDisplay.classList.add('show');
                
                return; // 処理を抜ける
            }

            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const h = String(hours).padStart(2, '0');
            const m = String(minutes).padStart(2, '0');
            const s = String(seconds).padStart(2, '0');

            timerDisplay.innerHTML = `${h}<br>${m}<br>${s}`;
        }

        const interval = setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
